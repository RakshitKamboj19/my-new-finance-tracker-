{% extends "base.html" %}

{% block title %}Signup | FinSmart{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-9 col-lg-6">
        <div class="surface-card p-4 p-lg-5 interactive-card">
            <div class="text-center mb-4">
                <div class="brand-mark mx-auto mb-3"><i class="bi bi-person-plus"></i></div>
                <h2 class="fw-bold">Create your account</h2>
                <p class="section-subtitle">Start building better finance habits with a modern student-friendly dashboard.</p>
            </div>
            <form method="post" class="auth-form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-soft-success w-100 mt-2">Create Account</button>
            </form>
            <p class="text-center mt-4 mb-0 text-muted">
                Already have an account? <a href="{% url 'login' %}" class="fw-semibold">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
